name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Verify project structure
      run: |
        echo "📁 Checking project files..."
        test -f index.html && echo "✓ index.html found" || exit 1
        test -f src/style.css && echo "✓ src/style.css found" || exit 1
        test -f src/script.js && echo "✓ src/script.js found" || exit 1
        echo "✓ All required files present!"
    
    - name: Check HTML syntax
      run: |
        echo "🔍 Validating HTML..."
        python3 -m html.parser < index.html > /dev/null && echo "✓ HTML syntax OK" || exit 1
    
    - name: Check file sizes
      run: |
        echo "📊 Checking file sizes..."
        du -h index.html src/style.css src/script.js

  build:
    needs: validate
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Build project
      run: |
        echo "🔨 Building CreativiAI..."
        echo "Project name: CreativiAI"
        echo "Version: 1.0.0"
        ls -lh
    
    - name: Create distribution
      run: |
        echo "📦 Creating distribution..."
        mkdir -p dist
        cp index.html dist/
        if [ -d src ]; then cp -r src dist/; fi
        if [ -f README.md ]; then cp README.md dist/; fi
        echo "✓ Distribution created!"
        ls -R dist/
    
    - name: Upload artifacts
      uses: actions/upload-artifact@v3
      with:
        name: dist
        path: dist/

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Download artifacts
      uses: actions/download-artifact@v3
      with:
        name: dist
    
    - name: Deploy to GitHub Pages
      uses: peaceiris/actions-gh-pages@v3
      with:
        github_token: ${{ secrets.GITHUB_TOKEN }}
        publish_dir: ./dist
    
    - name: Deployment notification
      run: echo "✅ Deployment successful! Site is live on GitHub Pages"

  test-local:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'
    
    - name: Start local server and verify
      run: |
        echo "🚀 Testing with local server..."
        python3 -m http.server 8000 &
        SERVER_PID=$!
        sleep 2
        curl -s http://localhost:8000/index.html | head -20
        kill $SERVER_PID
        echo "✓ Server test passed!"
